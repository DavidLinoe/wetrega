@let view = data();

<div class="flex flex-col gap-5 pb-6">
  <header
    class="rounded-b-[2.5rem] bg-gradient-to-br from-orange-500 to-orange-600 px-5 pb-6 pt-6 text-white"
  >
    <h1 class="text-2xl font-bold">Cardápio</h1>
    <p class="mt-1 text-sm text-white/90">Explore pratos disponíveis</p>
  </header>

  <section class="flex flex-col gap-3 px-5">
    @if (view.items.length === 0) {
      <p class="text-center text-sm text-gray-400 py-10">Nenhum item disponível no momento.</p>
    }

    @for (item of view.items; track item.id) {
      <article class="rounded-2xl bg-white p-4 shadow-sm">
        <div class="flex items-start justify-between gap-2">
          <div class="flex-1">
            <p class="text-xs font-semibold text-orange-500">{{ item.restaurantName }}</p>
            <h2 class="mt-0.5 font-semibold text-slate-800">{{ item.name }}</h2>
            @if (item.description) {
              <p class="mt-1 text-sm text-gray-500">{{ item.description }}</p>
            }
          </div>
          <span class="shrink-0 rounded-xl bg-orange-50 px-3 py-1.5 text-sm font-bold text-orange-600">
            {{ item.price }}
          </span>
        </div>
      </article>
    }
  </section>
</div>
