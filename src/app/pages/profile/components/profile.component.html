@let user = data();

<div class="flex flex-col gap-6 pb-6">
  <header
    class="rounded-b-[2.5rem] bg-gradient-to-br from-orange-500 to-orange-600 px-5 pb-8 pt-6 text-white"
  >
    <h1 class="text-2xl font-bold">Perfil</h1>
    <div class="mt-4 flex items-center gap-3">
      <div class="flex h-16 w-16 items-center justify-center rounded-full bg-white text-3xl">
        {{ user.avatar }}
      </div>
      <div>
        <p class="text-lg font-bold">{{ user.name }}</p>
        <p class="text-sm text-white/80">{{ user.email }}</p>
      </div>
    </div>
  </header>

  <section class="flex flex-col gap-2 px-5">
    @for (item of user.menu; track item.label) {
      <button
        type="button"
        class="flex items-center justify-between rounded-2xl bg-white p-4 shadow-sm"
      >
        <span class="flex items-center gap-3 text-sm font-medium text-slate-700">
          <span class="text-xl">{{ item.icon }}</span>
          {{ item.label }}
        </span>
        <span class="text-gray-300" aria-hidden="true">→</span>
      </button>
    }
  </section>
</div>
